<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Zasadaci poriadok - svadba</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5efe6;
    overflow: hidden;
    user-select: none;
  }
  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: #fff;
    border-bottom: 1px solid #d9cfc0;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  #toolbar h1 {
    font-size: 16px;
    margin: 0 16px 0 0;
    color: #5b4636;
    font-weight: 600;
  }
  button {
    background: #8b6f4e;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
  }
  button:hover { background: #6f573b; }
  button.secondary {
    background: #fff;
    color: #5b4636;
    border: 1px solid #d9cfc0;
  }
  button.secondary:hover { background: #f5efe6; }
  button.danger { background: #c44; }
  button.danger:hover { background: #a33; }
  #stats {
    margin-left: auto;
    color: #6f573b;
    font-size: 13px;
  }
  #canvas {
    position: absolute;
    top: 56px;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: auto;
    background:
      radial-gradient(circle, #e8dfd0 1px, transparent 1px) 0 0 / 30px 30px,
      #f5efe6;
  }
  #world {
    position: relative;
    width: 3000px;
    height: 2000px;
  }
  .table {
    position: absolute;
    width: 260px;
    height: 260px;
    cursor: move;
  }
  .table-circle {
    position: absolute;
    top: 50%; left: 50%;
    width: 110px;
    height: 110px;
    margin-top: -55px;
    margin-left: -55px;
    background: radial-gradient(circle at 35% 35%, #fff8ec, #d9c9a8);
    border: 2px solid #8b6f4e;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: #5b4636;
    font-weight: 600;
    text-align: center;
    font-size: 13px;
    padding: 4px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  .table-label {
    cursor: text;
    padding: 2px 6px;
    border-radius: 4px;
    max-width: 90px;
    word-break: break-word;
  }
  .table-label:hover { background: rgba(139,111,78,0.15); }
  .table-count {
    font-size: 10px;
    color: #8b6f4e;
    font-weight: 400;
    margin-top: 2px;
  }
  .seat {
    position: absolute;
    width: 56px;
    height: 56px;
    margin-left: -28px;
    margin-top: -28px;
    background: #fff;
    border: 2px solid #b89977;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 10px;
    color: #5b4636;
    cursor: pointer;
    padding: 2px;
    line-height: 1.1;
    overflow: hidden;
    word-break: break-word;
    transition: transform 0.1s, background 0.15s;
  }
  .seat:hover {
    transform: scale(1.1);
    background: #fff8ec;
    z-index: 10;
  }
  .seat.filled {
    background: #d4a574;
    color: #fff;
    border-color: #8b6f4e;
    font-weight: 500;
  }
  .seat.filled:hover { background: #c79358; }
  .table-delete {
    position: absolute;
    top: -6px; right: -6px;
    width: 22px; height: 22px;
    background: #c44;
    color: white;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    border: 2px solid white;
    z-index: 20;
  }
  .table:hover .table-delete { display: flex; }
  #help {
    position: fixed;
    bottom: 16px; left: 16px;
    background: rgba(255,255,255,0.95);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12px;
    color: #6f573b;
    border: 1px solid #d9cfc0;
    max-width: 280px;
    line-height: 1.5;
  }
  #help b { color: #5b4636; }
  /* Modal */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  .modal {
    background: white;
    padding: 24px;
    border-radius: 12px;
    min-width: 320px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal h2 { margin: 0 0 16px; font-size: 16px; color: #5b4636; }
  .modal input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d9cfc0;
    border-radius: 6px;
    font-size: 14px;
    margin-bottom: 16px;
  }
  .modal input:focus { outline: none; border-color: #8b6f4e; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>

<div id="toolbar">
  <h1>Zasadaci poriadok</h1>
  <button onclick="addTable()">+ Pridat stol</button>
  <button onclick="shareLink()">🔗 Zdielat</button>
  <button class="secondary" onclick="exportData()">Export</button>
  <button class="secondary" onclick="importData()">Import</button>
  <button class="secondary" onclick="window.print()">Tlac</button>
  <button class="danger" onclick="resetAll()">Vymazat vsetko</button>
  <div id="stats"></div>
</div>

<div id="canvas">
  <div id="world"></div>
</div>

<div id="help">
  <b>Tip:</b> Klikni na stolicku pre meno. Tahaj stol za stred. Dvojklik na nazov stola pre premenovanie. Tlacidlom <b>Zdielat</b> posles aktualny poriadok cez link.
</div>

<input type="file" id="fileInput" accept=".json" style="display:none">

<script>
const SEATS_PER_TABLE = 10;
const TABLE_SIZE = 260;
const SEAT_RADIUS = 100;
const STORAGE_KEY = 'wedding_seating_v1';

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { tables: [], nextId: 1 };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  updateStats();
}

function updateStats() {
  let total = 0, filled = 0;
  state.tables.forEach(t => {
    total += SEATS_PER_TABLE;
    t.seats.forEach(s => { if (s) filled++; });
  });
  document.getElementById('stats').textContent =
    `Stoly: ${state.tables.length} | Hosti: ${filled}/${total}`;
}

function addTable() {
  const world = document.getElementById('world');
  const canvas = document.getElementById('canvas');
  const x = canvas.scrollLeft + canvas.clientWidth / 2 - TABLE_SIZE / 2 + (Math.random() * 100 - 50);
  const y = canvas.scrollTop + canvas.clientHeight / 2 - TABLE_SIZE / 2 + (Math.random() * 100 - 50);
  state.tables.push({
    id: state.nextId++,
    name: `Stol ${state.tables.length + 1}`,
    x, y,
    seats: Array(SEATS_PER_TABLE).fill('')
  });
  saveState();
  render();
}

function deleteTable(id) {
  if (!confirm('Vymazat tento stol?')) return;
  state.tables = state.tables.filter(t => t.id !== id);
  saveState();
  render();
}

function render() {
  const world = document.getElementById('world');
  world.innerHTML = '';
  state.tables.forEach(table => {
    const el = document.createElement('div');
    el.className = 'table';
    el.style.left = table.x + 'px';
    el.style.top = table.y + 'px';
    el.dataset.id = table.id;

    const filledCount = table.seats.filter(s => s).length;

    el.innerHTML = `
      <div class="table-delete" onclick="event.stopPropagation(); deleteTable(${table.id})">×</div>
      <div class="table-circle">
        <div class="table-label" ondblclick="renameTable(${table.id})">${escapeHtml(table.name)}</div>
        <div class="table-count">${filledCount}/${SEATS_PER_TABLE}</div>
      </div>
    `;

    // seats around circle
    for (let i = 0; i < SEATS_PER_TABLE; i++) {
      const angle = (i / SEATS_PER_TABLE) * Math.PI * 2 - Math.PI / 2;
      const sx = TABLE_SIZE / 2 + Math.cos(angle) * SEAT_RADIUS;
      const sy = TABLE_SIZE / 2 + Math.sin(angle) * SEAT_RADIUS;
      const seat = document.createElement('div');
      seat.className = 'seat' + (table.seats[i] ? ' filled' : '');
      seat.style.left = sx + 'px';
      seat.style.top = sy + 'px';
      seat.textContent = table.seats[i] || (i + 1);
      seat.onclick = (e) => {
        e.stopPropagation();
        editSeat(table.id, i);
      };
      el.appendChild(seat);
    }

    makeDraggable(el, table);
    world.appendChild(el);
  });
  updateStats();
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renameTable(id) {
  const table = state.tables.find(t => t.id === id);
  if (!table) return;
  prompt2('Nazov stola:', table.name).then(val => {
    if (val !== null) {
      table.name = val.trim() || table.name;
      saveState();
      render();
    }
  });
}

function editSeat(tableId, seatIdx) {
  const table = state.tables.find(t => t.id === tableId);
  if (!table) return;
  prompt2(`Meno hosta (stol "${table.name}", miesto ${seatIdx + 1}):`, table.seats[seatIdx]).then(val => {
    if (val !== null) {
      table.seats[seatIdx] = val.trim();
      saveState();
      render();
    }
  });
}

// Custom prompt with nicer styling
function prompt2(question, defaultValue) {
  return new Promise(resolve => {
    const bg = document.createElement('div');
    bg.className = 'modal-bg';
    bg.innerHTML = `
      <div class="modal">
        <h2>${escapeHtml(question)}</h2>
        <input type="text" value="${escapeHtml(defaultValue || '')}" />
        <div class="modal-actions">
          <button class="secondary" data-act="cancel">Zrusit</button>
          <button data-act="ok">OK</button>
        </div>
      </div>
    `;
    document.body.appendChild(bg);
    const input = bg.querySelector('input');
    input.focus();
    input.select();
    function close(val) {
      document.body.removeChild(bg);
      resolve(val);
    }
    bg.querySelector('[data-act=ok]').onclick = () => close(input.value);
    bg.querySelector('[data-act=cancel]').onclick = () => close(null);
    input.onkeydown = e => {
      if (e.key === 'Enter') close(input.value);
      if (e.key === 'Escape') close(null);
    };
    bg.onclick = e => { if (e.target === bg) close(null); };
  });
}

function makeDraggable(el, table) {
  let startX, startY, origX, origY, dragging = false;
  el.querySelector('.table-circle').onmousedown = (e) => {
    if (e.target.classList.contains('table-label')) return;
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    origX = table.x;
    origY = table.y;
    e.preventDefault();
  };
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    table.x = origX + (e.clientX - startX);
    table.y = origY + (e.clientY - startY);
    el.style.left = table.x + 'px';
    el.style.top = table.y + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (dragging) {
      dragging = false;
      saveState();
    }
  });
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'zasadaci-poriadok.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData() {
  document.getElementById('fileInput').click();
}

document.getElementById('fileInput').onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.tables && Array.isArray(data.tables)) {
        state = data;
        saveState();
        render();
      } else alert('Neplatny subor');
    } catch(err) {
      alert('Chyba pri citani: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
};

function resetAll() {
  if (!confirm('Naozaj vymazat vsetky stoly a mena?')) return;
  state = { tables: [], nextId: 1 };
  saveState();
  render();
}

// Encode state into URL hash (base64) so it can be shared via link
function encodeStateToHash(s) {
  const json = JSON.stringify(s);
  // utf-8 safe base64
  return btoa(unescape(encodeURIComponent(json)));
}
function decodeStateFromHash(hash) {
  try {
    const json = decodeURIComponent(escape(atob(hash)));
    const parsed = JSON.parse(json);
    if (parsed && Array.isArray(parsed.tables)) return parsed;
  } catch(e) {}
  return null;
}

async function shareLink() {
  const encoded = encodeStateToHash(state);
  const url = `${location.origin}${location.pathname}#data=${encoded}`;
  try {
    await navigator.clipboard.writeText(url);
    showToast('Link skopirovany do schranky! Posli ho komu chces.');
  } catch(e) {
    // fallback: show in prompt
    prompt2('Skopiruj tento link a posli ho:', url);
  }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#5b4636;color:white;padding:12px 20px;border-radius:8px;font-size:14px;z-index:300;box-shadow:0 6px 20px rgba(0,0,0,0.3);';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// Check URL hash on load — if it contains shared data, offer to load it
function checkSharedLink() {
  const hash = location.hash;
  const match = hash.match(/^#data=(.+)$/);
  if (!match) return false;
  const shared = decodeStateFromHash(match[1]);
  if (!shared) return false;

  const hasLocal = state.tables.length > 0;
  const msg = hasLocal
    ? `Dostal si zdielany zasadaci poriadok (${shared.tables.length} stolov). Nacitat ho? POZOR: prepise tvoj sucasny poriadok.`
    : `Nacitat zdielany zasadaci poriadok (${shared.tables.length} stolov)?`;

  if (confirm(msg)) {
    state = shared;
    saveState();
    // clean URL so refresh doesn't re-ask
    history.replaceState(null, '', location.pathname);
    render();
    return true;
  }
  return false;
}

// init - check for shared link first
const loadedFromShare = checkSharedLink();

if (!loadedFromShare && state.tables.length === 0) {
  // create a few starter tables
  for (let i = 0; i < 3; i++) {
    state.tables.push({
      id: state.nextId++,
      name: `Stol ${i + 1}`,
      x: 300 + i * 320,
      y: 200,
      seats: Array(SEATS_PER_TABLE).fill('')
    });
  }
  saveState();
}
render();

// scroll to middle on load
window.addEventListener('load', () => {
  const canvas = document.getElementById('canvas');
  canvas.scrollLeft = 200;
  canvas.scrollTop = 100;
});
</script>
</body>
</html>
